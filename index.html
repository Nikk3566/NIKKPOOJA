<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>पुजा के लिए खास प्रस्ताव</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene">
    <div class="gift-grid">
      <div class="box-card" data-index="0">
        <div class="box-top"></div>
        <div class="box-body"></div>
        <div class="box-label">
          <h2>Pyar Ka Box</h2>
          <span>Love letter with rosy dreams</span>
        </div>
      </div>
      <div class="box-card" data-index="1">
        <div class="box-top"></div>
        <div class="box-body"></div>
        <div class="box-label">
          <h2>Chandni Box</h2>
          <span>Moonlit shayari for Pooja</span>
        </div>
      </div>
      <div class="box-card" data-index="2">
        <div class="box-top"></div>
        <div class="box-body"></div>
        <div class="box-label">
          <h2>Dream Star</h2>
          <span>Sweet wishes wrapped in light</span>
        </div>
      </div>
      <div class="box-card" data-index="3">
        <div class="box-top"></div>
        <div class="box-body"></div>
        <div class="box-label">
          <h2>Sun Glow</h2>
          <span>Warm feelings, golden hope</span>
        </div>
      </div>
      <div class="box-card" data-index="4">
        <div class="box-top"></div>
        <div class="box-body"></div>
        <div class="box-label">
          <h2>Forever</h2>
          <span>Promise from Nikk to Pooja</span>
        </div>
      </div>
    </div>

    <div id="loveLetter" class="love-letter hidden">
      <div class="letter-card">
        <div class="header">
          <div class="neon-heart"></div>
          <h1 id="letterTitle">POOJA</h1>
          <p id="letterSubtitle">NIKK 💌</p>
        </div>
        <div class="letter-content" id="letterContent"></div>
        <div class="proposal-line" id="proposalLine"></div>
        <div class="shayari" id="shayariOne"></div>
        <div class="shayari" id="shayariTwo"></div>
        <div class="romantic-link">
          <a href="#" onclick="return false;" id="romanticLink">🌹 Pooja, मेरे दिल का प्यार 🌹</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
